#--------------------------------------------------------------
# CACE circuit characterization file
# Block: transmissiongate
# PDK: IHP SG13G2
#--------------------------------------------------------------

name:           transmissiongate
description:    Transmission gate (pass gate) using IHP SG13G2 130nm PDK
PDK:            sg13g2

cace_format:    5.2

authorship:
  designer:         EAMTA 2026 Students
  organization:     EAMTA 2026 - VLSI Course
  creation_date:    March 2026
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        schematic
  layout:           layout
  netlist:          schematic
  documentation:    .

pins:
  VDD:
    description: Positive power supply
    type: power
    direction: inout
    Vmin: 1.0
    Vmax: 1.4
  VSS:
    description: Ground
    type: ground
    direction: inout
  in:
    description: Signal input
    type: signal
    direction: input
  out:
    description: Signal output
    type: signal
    direction: output
  a_neg:
    description: Complementary control signal (active low for PMOS)
    type: signal
    direction: input
  a_pos:
    description: Control signal (active high for NMOS)
    type: signal
    direction: input

default_conditions:
  vdd:
    description: Positive supply voltage
    display: VDD
    unit: V
    typical: 1.2
  temperature:
    description: Ambient temperature
    display: Temp
    unit: °C
    minimum: -40
    typical: 27
    maximum: 125
  corner:
    description: Process corner
    display: Corner
    typical: tt

parameters:
  ron:
    description: On-state resistance
    display: Ron
    unit: Ω
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 5000
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  tpd:
    description: Propagation delay
    display: tpd
    unit: s
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 200e-12
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125
