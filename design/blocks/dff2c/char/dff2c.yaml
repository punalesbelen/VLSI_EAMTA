#--------------------------------------------------------------
# CACE circuit characterization file
# Block: dff2c (D Flip-Flop with dual clock, 2-complement)
# PDK: IHP SG13G2
#--------------------------------------------------------------

name:           dff2c
description:    D Flip-Flop with complementary clocks and clear using IHP SG13G2 130nm PDK
PDK:            sg13g2

cace_format:    5.2

authorship:
  designer:         EAMTA 2026 Students
  organization:     EAMTA 2026 - VLSI Course
  creation_date:    March 2026
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        schematic
  layout:           layout
  netlist:          schematic
  documentation:    .

pins:
  VDD:
    description: Positive power supply
    type: power
    direction: inout
    Vmin: 1.0
    Vmax: 1.4
  VSS:
    description: Ground
    type: ground
    direction: inout
  D:
    description: Data input
    type: signal
    direction: input
  CLK1:
    description: Clock input
    type: signal
    direction: input
  CLR:
    description: Synchronous clear (active high)
    type: signal
    direction: input
  Q:
    description: Data output
    type: signal
    direction: output
  Qb:
    description: Complementary data output
    type: signal
    direction: output

default_conditions:
  vdd:
    description: Positive supply voltage
    display: VDD
    unit: V
    typical: 1.2
  temperature:
    description: Ambient temperature
    display: Temp
    unit: °C
    minimum: -40
    typical: 27
    maximum: 125
  corner:
    description: Process corner
    display: Corner
    typical: tt

parameters:
  tsu:
    description: Setup time (D to CLK)
    display: tsu
    unit: s
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 100e-12
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  th:
    description: Hold time (D after CLK)
    display: th
    unit: s
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 100e-12
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  tclk2q:
    description: Clock to Q propagation delay
    display: tclk2q
    unit: s
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 500e-12
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  max_freq:
    description: Maximum operating frequency
    display: fmax
    unit: Hz
    spec:
      minimum:
        value: 10e6
      typical:
        value: any
      maximum:
        value: any
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125
