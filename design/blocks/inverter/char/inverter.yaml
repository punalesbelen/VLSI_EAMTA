#--------------------------------------------------------------
# CACE circuit characterization file
# Block: inverter
# PDK: IHP SG13G2
#--------------------------------------------------------------

name:           inverter
description:    CMOS Inverter using IHP SG13G2 130nm PDK
PDK:            sg13g2

cace_format:    5.2

authorship:
  designer:         EAMTA 2026 Students
  organization:     EAMTA 2026 - VLSI Course
  creation_date:    March 2026
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        schematic
  layout:           layout
  netlist:          schematic
  documentation:    .

pins:
  VDD:
    description: Positive power supply
    type: power
    direction: inout
    Vmin: 1.0
    Vmax: 1.4
  VSS:
    description: Ground
    type: ground
    direction: inout
  in:
    description: Logic input
    type: signal
    direction: input
  out:
    description: Logic output (inverted)
    type: signal
    direction: output

default_conditions:
  vdd:
    description: Positive supply voltage
    display: VDD
    unit: V
    typical: 1.2
  temperature:
    description: Ambient temperature
    display: Temp
    unit: °C
    minimum: -40
    typical: 27
    maximum: 125
  corner:
    description: Process corner
    display: Corner
    typical: tt

parameters:
  voh:
    description: Output high voltage
    display: VOH
    unit: V
    spec:
      minimum:
        value: 1.0
      typical:
        value: any
      maximum:
        value: any
    tool:
      ngspice:
        template: inv_dc.spice
        format: ascii
        suffix: .data
        variables: [voh]
    conditions:
      vdd:
        minimum: 1.08
        typical: 1.2
        maximum: 1.32
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  vol:
    description: Output low voltage
    display: VOL
    unit: V
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 0.2
    tool:
      ngspice:
        template: inv_dc.spice
        format: ascii
        suffix: .data
        variables: [vol]
    conditions:
      vdd:
        minimum: 1.08
        typical: 1.2
        maximum: 1.32
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  tpd_rise:
    description: Propagation delay, output rising
    display: tpd_rise
    unit: s
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 200e-12
    tool:
      ngspice:
        template: inv_tran.spice
        format: ascii
        suffix: .data
        variables: [tpd_rise]
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  tpd_fall:
    description: Propagation delay, output falling
    display: tpd_fall
    unit: s
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 200e-12
    tool:
      ngspice:
        template: inv_tran.spice
        format: ascii
        suffix: .data
        variables: [tpd_fall]
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125
